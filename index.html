<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator PPh by Adien</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --card-color: #1e1f20;
            --accent-blue: #4e95ff;
            --accent-purple: #9d7aff;
            --text-main: #e3e3e3;
            --text-dim: #b4b4b4;
            --border: #333333;
            --island: #2f2f30;
        }

        /* RESET & LOCK BODY */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        html, body { 
            background-color: var(--bg-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Body tetap terkunci */
            position: fixed;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- MODAL --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .modal {
            background: var(--card-color); padding: 30px; border-radius: 28px;
            max-width: 400px; width: 85%; border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center;
        }

        .modal h2 {
            font-size: 20px; margin-bottom: 12px; font-weight: 700;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .modal p { color: var(--text-dim); line-height: 1.5; font-size: 14px; margin-bottom: 20px; text-align: left; }

        .btn-prime {
            width: 100%; padding: 14px; background: #ffffff; color: #000000;
            border: none; border-radius: 100px; font-weight: 600; cursor: pointer;
        }

        /* --- CONTAINER UTAMA --- */
        .container {
            background: var(--card-color);
            padding: 30px;
            border-radius: 32px;
            width: 92%;
            max-width: 440px;
            max-height: 90vh; /* Tinggi maksimal container */
            border: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Area Scrollable di dalam kartu */
        .scroll-content {
            overflow-y: auto; /* Aktifkan scroll hanya di dalam sini */
            padding-right: 5px;
            flex-grow: 1;
        }

        /* Sembunyikan scrollbar agar tetap minimalis (Chrome/Safari) */
        .scroll-content::-webkit-scrollbar { width: 4px; }
        .scroll-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .island {
            width: 110px; height: 30px; background: var(--island);
            border-radius: 100px; margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 10px; font-weight: 500; letter-spacing: 1px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .island-active { width: 220px; height: 36px; background: linear-gradient(90deg, #1a73e8, #7b1fa2); }

        h1 { text-align: center; font-size: 18px; font-weight: 600; margin-bottom: 25px; flex-shrink: 0; }

        .field { margin-bottom: 18px; }
        .label-row { display: flex; align-items: center; margin-bottom: 8px; }
        label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .hint {
            width: 16px; height: 16px; background: #3c4043; color: #fff;
            border-radius: 50%; font-size: 10px; margin-left: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        input {
            width: 100%; padding: 14px; border: 1px solid #444; border-radius: 12px;
            font-size: 16px; background: var(--bg-color); color: white; outline: none;
        }

        .btn-calc {
            width: 100%; padding: 16px; 
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white; border: none; border-radius: 100px;
            font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 5px;
            flex-shrink: 0;
        }

        /* --- HASIL --- */
        .results { margin-top: 25px; display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .summary-card { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; 
            text-align: center; border: 1px solid var(--border); margin-bottom: 15px;
        }
        .total-val { font-size: 28px; font-weight: 700; margin: 5px 0; color: #fff; }
        .sub-val { font-size: 12px; color: var(--accent-blue); font-weight: 500; }

        .row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .row:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="guide" class="overlay">
        <div class="modal">
            <h2>Kalkulator Pajak by Adien</h2>
            <p>Penghitungan PPh 21 menggunakan rumus progresif yang presisi. Anda dapat melihat rincian pemotongan per lapisan tarif secara mendalam.</p>
            <button class="btn-prime" onclick="closeM('guide')">Mulai Sekarang</button>
        </div>
    </div>

    <div class="container">
        <div class="island" id="island">TAX SYSTEM</div>
        <h1>PPh 21 Calculator</h1>

        <div class="scroll-content">
            <div class="field">
                <div class="label-row"><label>Penghasilan Netto Setahun</label></div>
                <input type="text" id="dispGaji" placeholder="Rp 0" oninput="fmtRp(this)">
                <input type="hidden" id="rawGaji">
            </div>

            <div class="field">
                <div class="label-row"><label>Jumlah Tanggungan</label></div>
                <input type="number" id="tanggungan" min="0" value="0">
            </div>

            <button class="btn-calc" onclick="calc()">HITUNG RINCIAN</button>

            <div id="resArea" class="results">
                <div class="summary-card">
                    <span style="font-size: 10px; color: var(--text-dim); text-transform: uppercase;">Pajak Terutang Setahun</span>
                    <div class="total-val" id="resTahun"></div>
                    <div class="sub-val">± <span id="resBulan"></span> / Bulan</div>
                </div>

                <div id="tiers"></div>
                
                <div class="row" style="border-top: 1px solid var(--border); margin-top: 10px; padding-top: 15px; margin-bottom: 20px;">
                    <span style="color: var(--text-main); font-weight: 600;">Total PKP</span>
                    <span id="resPkp" style="color: var(--accent-purple); font-weight: 700;"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function fmtRp(e) {
            let v = e.value.replace(/[^,\d]/g, '');
            document.getElementById('rawGaji').value = v;
            if (v) e.value = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(v);
        }

        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') calc(); });

        function calc() {
            const gaji = parseFloat(document.getElementById('rawGaji').value) || 0;
            const tang = parseInt(document.getElementById('tanggungan').value) || 0;
            const isl = document.getElementById('island');

            if (gaji <= 0) {
                isl.innerText = "CEK INPUT";
                isl.style.background = "#ea4335";
                setTimeout(() => { isl.innerText = "TAX SYSTEM"; isl.style.background = "#2f2f30"; }, 2000);
                return;
            }

            isl.classList.add('island-active');
            isl.innerText = "PROCESSING LAYERS...";

            setTimeout(() => {
                const ptkp = 54000000 + (tang * 4500000);
                let pkpSisa = Math.max(0, gaji - ptkp);
                const pkpTotal = pkpSisa;

                // Definisi Lapisan Tarif Progresif
                const lapisan = [
                    { limit: 60000000, rate: 0.05, label: "Lapisan I (5%)" },
                    { limit: 190000000, rate: 0.15, label: "Lapisan II (15%)" },
                    { limit: 250000000, rate: 0.25, label: "Lapisan III (25%)" },
                    { limit: 4500000000, rate: 0.30, label: "Lapisan IV (30%)" },
                    { limit: Infinity, rate: 0.35, label: "Lapisan V (35%)" }
                ];

                let totalPajak = 0;
                let htmlDetail = "";
                const f = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

                for (let lap of lapisan) {
                    if (pkpSisa <= 0) break; // Jika PKP sudah habis, berhenti di sini.

                    let porsiPKP = Math.min(pkpSisa, lap.limit);
                    let pajakLapisan = porsiPKP * lap.rate;
                    
                    totalPajak += pajakLapisan;
                    htmlDetail += `<div class="row">
                        <span style="color:var(--text-dim)">${lap.label}</span>
                        <span style="font-weight: 600;">${f(pajakLapisan)}</span>
                    </div>`;
                    
                    pkpSisa -= porsiPKP;
                }

                document.getElementById('resArea').style.display = 'block';
                document.getElementById('tiers').innerHTML = htmlDetail || `<div class="row"><span>Status</span><span>Bebas Pajak (Nihil)</span></div>`;
                document.getElementById('resPkp').innerText = f(pkpTotal);
                document.getElementById('resTahun').innerText = f(totalPajak);
                document.getElementById('resBulan').innerText = f(totalPajak/12);

                isl.innerText = "SUCCESSFULLY ANALYZED ✨";
                setTimeout(() => { isl.classList.remove('island-active'); isl.innerText = "TAX SYSTEM"; }, 1500);
                
                // Scroll otomatis ke hasil agar user tahu ada konten di bawah
                document.querySelector('.scroll-content').scrollTo({ top: 500, behavior: 'smooth' });

            }, 600);
        }
    </script>
</body>
</html>
