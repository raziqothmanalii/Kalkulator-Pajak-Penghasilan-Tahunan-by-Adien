<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator PPh by Adien</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-color: #1c1c1e;
            --accent-blue: #007aff;
            --accent-purple: #af52de;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border: #38383a;
            --island: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER STYLE */
        header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* DYNAMIC ISLAND */
        .island-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 15px;
            z-index: 200;
        }

        .island {
            width: 120px;
            height: 32px;
            background: var(--island);
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border: 1px solid #333;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: default;
        }

        .island-active {
            width: 200px;
            height: 38px;
            background: #1c1c1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: var(--accent-blue);
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: var(--card-color);
            padding: 32px;
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            max-height: 85vh;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .scroll-content {
            overflow-y: auto;
            padding-right: 4px;
        }

        .scroll-content::-webkit-scrollbar { width: 3px; }
        .scroll-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .field { margin-bottom: 24px; }
        .label-row { display: flex; align-items: center; margin-bottom: 10px; }
        label { font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 16px;
            background: #2c2c2e;
            border: 1px solid transparent;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: var(--accent-blue); background: #000000; }

        .btn-calc {
            width: 100%;
            padding: 18px;
            background: var(--text-main);
            color: #000;
            border: none;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-calc:active { transform: scale(0.96); }

        /* MODAL OVERLAY */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }

        .modal {
            background: #1c1c1e; padding: 32px; border-radius: 32px;
            width: 88%; max-width: 380px; border: 1px solid var(--border);
            text-align: center;
        }

        .btn-prime {
            width: 100%; padding: 16px; background: var(--accent-blue);
            color: white; border: none; border-radius: 100px; font-weight: 700;
        }

        /* RESULTS */
        .results { margin-top: 30px; display: none; animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .summary-card {
            background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
            padding: 24px; border-radius: 24px;
            border: 1px solid var(--border); margin-bottom: 20px;
        }

        .total-val { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 8px 0; }
        .row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span class="brand-title">Kalkulator Pajak <span style="color:var(--accent-blue)">by Adien</span></span>
            <span class="brand-sub">Beta Edition</span>
        </div>
        <div class="island-container">
            <div class="island" id="island">SIAP HITUNG</div>
        </div>
        <div style="width: 40px;"></div> </header>

    <div id="guide" class="overlay">
        <div class="modal">
            <div style="font-size: 40px; margin-bottom: 15px;">📊</div>
            <h2 style="margin-bottom: 15px;">Pajak Penghasilan</h2>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 25px; line-height: 1.5;">Hitung estimasi PPh sesuai UU HPP terbaru secara instan dan rapi.</p>
            <button class="btn-prime" onclick="closeM('guide')">Mulai Hitung</button>
        </div>
    </div>

    <main>
        <div class="container">
            <div class="scroll-content">
                <div class="field">
                    <div class="label-row"><label>Penghasilan Netto / Tahun</label></div>
                    <input type="text" id="dispGaji" placeholder="Rp 0" oninput="fmtRp(this)">
                </div>

                <div class="field">
                    <div class="label-row"><label>Tanggungan (PTKP)</label></div>
                    <input type="number" id="tanggungan" value="0" min="0" max="3">
                </div>

                <button class="btn-calc" onclick="calc()">HITUNG PAJAK</button>

                <div id="resArea" class="results">
                    <div class="summary-card">
                        <span style="font-size: 11px; color: var(--text-dim); font-weight: 700; text-transform: uppercase;">Pajak Terutang</span>
                        <div class="total-val" id="resTahun">Rp 0</div>
                        <div style="color: var(--accent-blue); font-size: 13px; font-weight: 600;">± <span id="resBulan"></span> / bulan</div>
                    </div>

                    <div id="tiers"></div>
                    
                    <div class="row" style="border: none; margin-top: 10px;">
                        <span style="color: var(--text-dim);">PKP Akhir</span>
                        <span id="resPkp" style="font-weight: 700; color: var(--accent-purple);"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
        
        function fmtRp(el) {
            let val = el.value.replace(/\D/g, '');
            el.value = val ? 'Rp ' + new Intl.NumberFormat('id-ID').format(val) : '';
        }

        function calc() {
            const isl = document.getElementById('island');
            isl.classList.add('island-active');
            isl.innerText = "SEDANG MENGHITUNG...";

            setTimeout(() => {
                // Logika hitung sederhana (contoh)
                document.getElementById('resArea').style.display = 'block';
                document.getElementById('resTahun').innerText = "Rp 1.250.000"; // Dummy
                document.getElementById('resBulan').innerText = "104.166"; // Dummy
                
                isl.classList.remove('island-active');
                isl.innerText = "HASIL SELESAI";
            }, 800);
        }
    </script>
</body>
</html>

    <script>
        document.addEventListener('keydown', function(e) { if (e.key === 'Enter') calc(); });

        function openM(id) {
            const e = document.getElementById(id);
            e.style.display = 'flex';
            setTimeout(() => e.style.opacity = '1', 10);
        }

        function closeM(id) {
            const e = document.getElementById(id);
            e.style.opacity = '0';
            setTimeout(() => e.style.display = 'none', 300);
        }

        function fmtRp(e) {
            let v = e.value.replace(/[^,\d]/g, '');
            document.getElementById('rawGaji').value = v;
            if (v) e.value = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(v);
        }

        function calc() {
            const gaji = parseFloat(document.getElementById('rawGaji').value) || 0;
            const tang = parseInt(document.getElementById('tanggungan').value) || 0;
            const isl = document.getElementById('island');

            if (gaji <= 0) {
                isl.innerText = "CEK INPUT";
                isl.style.background = "#ea4335";
                setTimeout(() => { isl.innerText = "PERHITUNGAN SELESAI"; isl.style.background = "#2f2f30"; }, 2000);
                return;
            }

            isl.classList.add('island-active');
            isl.innerText = "CALCULATING...";

            setTimeout(() => {
                // Perhitungan PTKP Tanpa Batasan (Cap)
                const ptkp = 54000000 + (tang * 4500000);
                let pkpSisa = Math.max(0, gaji - ptkp);
                const pkpTotal = pkpSisa;

                const lapisan = [
                    { cap: 60000000, rate: 0.05, label: "Lapisan I (5%)" },
                    { cap: 190000000, rate: 0.15, label: "Lapisan II (15%)" },
                    { cap: 250000000, rate: 0.25, label: "Lapisan III (25%)" },
                    { cap: 4500000000, rate: 0.30, label: "Lapisan IV (30%)" },
                    { cap: Infinity, rate: 0.35, label: "Lapisan V (35%)" }
                ];

                let totalPajak = 0;
                let htmlDetail = "";
                const f = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

                for (let lap of lapisan) {
                    if (pkpSisa <= 0) break; 
                    let porsi = Math.min(pkpSisa, lap.cap);
                    let pajak = porsi * lap.rate;
                    totalPajak += pajak;
                    htmlDetail += `<div class="row"><span style="color:var(--text-dim)">${lap.label}</span><span style="font-weight: 600;">${f(pajak)}</span></div>`;
                    pkpSisa -= porsi;
                }

                document.getElementById('resArea').style.display = 'block';
                document.getElementById('tiers').innerHTML = htmlDetail || `<div class="row"><span>Status</span><span>Nihil</span></div>`;
                document.getElementById('resPkp').innerText = f(pkpTotal);
                document.getElementById('resTahun').innerText = f(totalPajak);
                document.getElementById('resBulan').innerText = f(totalPajak/12);

                isl.innerText = "DONE ✨";
                setTimeout(() => { isl.classList.remove('island-active'); isl.innerText = "PERHITUNGAN SELESAI"; }, 1500);
                
                document.querySelector('.scroll-content').scrollTo({ top: 400, behavior: 'smooth' });
            }, 500);
        }
    </script>
</body>
</html>
